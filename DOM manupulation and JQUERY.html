<html>
  <head>
    <title>College Event Panel (jQuery)</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
      /* Page styling */
      body {
        background-color: lightgray;
        font-family: Arial;
      }

      /* Main box */
      .container {
        width: 380px;
        margin: 60px auto;
        background-color: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 2px 2px 12px gray;
        text-align: center;
      }

      h2 {
        color: darkblue;
      }

      /* Buttons */
      button {
        padding: 8px 14px;
        margin: 5px;
        background-color: steelblue;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }

      button:hover {
        background-color: navy;
      }

      /* Event panel */
      #panel {
        background-color: aliceblue;
        margin-top: 15px;
        padding: 12px;
        border-radius: 6px;
        display: none;
      }

      /* Animation class */
      .animate {
        animation: slideFade 0.6s ease;
      }

      @keyframes slideFade {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>College Event Panel</h2>

      <div>
        <button id="event1">Show Event 1</button>
        <button id="event2">Show Event 2</button>
      </div>

      <div>
        <button id="showBtn">Show</button>
        <button id="hideBtn">Hide</button>
        <button id="toggleBtn">Toggle</button>
        <button id="animateBtn">Animate</button>
      </div>

      <div id="panel">
        <h4 id="title">Event Title</h4>
        <p id="info">Event information will appear here.</p>
      </div>
    </div>

    <script>
      $(document).ready(function () {
        $("#event1").click(function () {
          $("#title").text("Web Development Workshop");
          $("#info").text("Date: 5 March | Time: 10 AM | Venue: Lab 2");
          $("#panel").slideDown();
        });

        $("#event2").click(function () {
          $("#title").text("Tech Seminar");
          $("#info").text("Date: 10 March | Time: 12 PM | Venue: Seminar Hall");
          $("#panel").slideDown();
        });

        $("#showBtn").click(function () {
          $("#panel").fadeIn();
        });

        $("#hideBtn").click(function () {
          $("#panel").fadeOut();
        });

        $("#toggleBtn").click(function () {
          $("#panel").slideToggle();
        });

        $("#animateBtn").click(function () {
          $("#panel").show();
          $("#panel").removeClass("animate");
          $("#panel")[0].offsetWidth;
          $("#panel").addClass("animate");
        });
      });
    </script>
  </body>
</html>
